name: Python lint

concurrency:
  group: py-lint-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

jobs:
  ci:
    name: Python lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install tools required for tests
        run: |
          sudo apt update
          sudo apt -y install flake8

      - name: Flake8 check
        run: |
          flake8 tests src/python
