[package]
name = "nipc"
version = "1.0.1"
authors = ["Gris Ge <cnfourt@gmail.com>"]
license = "Apache-2.0"
edition = "2018"
description = "Command line tool for Nipart"
homepage = "https://github.com/nispor/nipart"
repository = "https://github.com/nispor/nipart"
keywords = ["network"]
categories = ["network-programming", "os"]

[[bin]]
name = "nipc"
path = "nipc.rs"

[dependencies]
serde = "1.0"
nipart = {path = "../lib"}
tokio = { version = "1.3", features = ["rt", "net", "io-util"]}
clap = "2.33"
serde_yaml = "0.8.24"
