[package]
name = "nipartd"
version = "1.0.1"
authors = ["Gris Ge <cnfourt@gmail.com>"]
license = "Apache-2.0"
edition = "2018"
description = "Network Manager"
homepage = "https://github.com/nispor/nipart"
repository = "https://github.com/nispor/nipart"
keywords = ["network"]
categories = ["network-programming", "os"]

[[bin]]
name = "nipartd"
path = "nipartd.rs"

[dependencies]
serde = "1.0"
nipart = {path = "../lib"}
tokio = {version = "1.3", features = ["rt", "net", "io-util"]}
serde_yaml = "0.8"
log = "0.4.17"
env_logger = "0.9.0"
